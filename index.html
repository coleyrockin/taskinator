<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Taskinator is a lightweight browser task board for adding, editing, organizing, and persisting personal tasks locally.">
  <meta name="theme-color" content="#497980">
  <title>Taskinator | Local Task Board</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <a class="skip-link" href="#page-content">Skip to task board</a>

  <header class="site-header">
    <div class="header-content">
      <h1 class="page-title">Taskinator</h1>
      <p class="page-description">Add a task, choose a type, and move it through your workflow.</p>

      <form id="task-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="task-name">Task name</label>
          <input
            id="task-name"
            type="text"
            name="task-name"
            class="text-input"
            placeholder="Enter task name"
            autocomplete="off"
            maxlength="80"
            required
            aria-describedby="task-name-hint status-message"
          >
          <p class="form-hint" id="task-name-hint">Use 80 characters or fewer.</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="task-type">Task type</label>
          <select id="task-type" name="task-type" class="select-dropdown" required aria-describedby="status-message">
            <option value="" disabled selected>Pick a task type</option>
            <option value="Print">Print</option>
            <option value="Web">Web</option>
            <option value="Mobile">Mobile</option>
          </select>
        </div>

        <div class="form-group form-group-button">
          <button class="btn" id="save-task" type="submit">Add Task</button>
        </div>
      </form>

      <p class="status-message" id="status-message" role="status" aria-live="polite"></p>
    </div>
  </header>

  <main class="page-content" id="page-content" aria-label="Task board">
    <section class="task-list-wrapper" aria-labelledby="tasks-to-do-title">
      <h2 class="list-title" id="tasks-to-do-title">Tasks To Do</h2>
      <ul class="task-list" id="tasks-to-do" aria-label="Tasks to do"></ul>
    </section>

    <section class="task-list-wrapper" aria-labelledby="tasks-in-progress-title">
      <h2 class="list-title" id="tasks-in-progress-title">Tasks In Progress</h2>
      <ul class="task-list" id="tasks-in-progress" aria-label="Tasks in progress"></ul>
    </section>

    <section class="task-list-wrapper" aria-labelledby="tasks-completed-title">
      <h2 class="list-title" id="tasks-completed-title">Tasks Completed</h2>
      <ul class="task-list" id="tasks-completed" aria-label="Tasks completed"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Taskinator. Data stays in your browser.</p>
  </footer>

  <script src="./assets/js/script.js" defer></script>
</body>
</html>
